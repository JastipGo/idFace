<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background-color: var(--bg-body); color: var(--text-main); padding: 25px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .badge-today {
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        .card-value {
            font-size: 26px;
            font-weight: 800;
            margin-top: 12px;
        }

        .val-success { color: var(--success); }
        .val-danger { color: var(--danger); }
        .val-primary { color: var(--primary); }

        /* Chart & Table */
        .chart-container {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .chart-header h2 {
            margin: 0;
            font-size: 16px;
            color: var(--text-main);
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 13px;
            outline: none;
            cursor: pointer;
            background: #f8fafc;
            color: var(--text-main);
            font-weight: 500;
        }

        .filter-select:focus {
            border-color: var(--primary);
        }

        .canvas-wrapper {
            height: 320px;
            width: 100%;
        }

        .table-container {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            background-color: #f8fafc;
            padding: 14px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 2px solid var(--border);
        }

        td { padding: 10px 14px; border-bottom: 1px solid var(--border); }

        /* Inline Input Penyesuaian */
        input.inline-input {
            width: 100%;
            border: 2px solid transparent;
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
            background: transparent;
        }

        input.inline-input:focus {
            outline: none;
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); }
        
        .btn-danger { background: #fee2e2; color: var(--danger); font-size: 12px; padding: 8px 12px; }
        .btn-danger:hover { background: var(--danger); color: white; }

        .text-right { text-align: right; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1>Overview Keuangan</h1>
        <button class="btn" style="background: #f1f5f9; color: #64748b;" onclick="hapusSemua()">Reset Data</button>
    </div>

    <div class="summary-grid">
        <div class="card">
            <div class="card-title">Pendapatan <span class="badge-today">Hari Ini</span></div>
            <div class="card-value val-success" id="totPendapatanHariIni">Rp 0</div>
        </div>
        <div class="card">
            <div class="card-title">Pengeluaran <span class="badge-today">Hari Ini</span></div>
            <div class="card-value val-danger" id="totPengeluaranHariIni">Rp 0</div>
        </div>
        <div class="card">
            <div class="card-title">Saldo Akhir <span class="badge-today" style="background:#e0e7ff">Total</span></div>
            <div class="card-value val-primary" id="totSaldo">Rp 0</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <h2>Trend Saldo</h2>
            <div class="filter-group">
                <select id="filterRange" class="filter-select" onchange="renderUI()">
                    <option value="minggu">Minggu Ini</option>
                    <option value="bulan" selected>Bulan Ini</option>
                    <option value="tahun">Tahun Ini</option>
                    <option value="semua">Semua</option>
                </select>
                <select id="filterGroup" class="filter-select" onchange="renderUI()">
                    <option value="harian" selected>Harian</option>
                    <option value="mingguan">Mingguan</option>
                    <option value="bulanan">Bulanan</option>
                </select>
            </div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="saldoChart"></canvas>
        </div>
    </div>

    <div class="table-container">
        <div class="table-header">
            <h2>Riwayat Transaksi</h2>
            <button class="btn" onclick="tambahBaris()">+ Tambah Data Baru</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th width="15%">Tanggal</th>
                    <th width="20%">Pendapatan (Rp)</th>
                    <th width="20%">Pengeluaran (Rp)</th>
                    <th class="text-right">Tabungan</th>
                    <th class="text-right">Saldo</th>
                    <th width="80px"></th>
                </tr>
            </thead>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>
</div>

<script>
    let dataKeuangan = JSON.parse(localStorage.getItem('finance_db_v3')) || [];
    let saldoChartInstance = null;

    const formatRp = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
    const getTodayStr = () => new Date().toISOString().split('T')[0];

    window.formatDanSimpan = (el, idx, field) => {
        let rawValue = el.value.replace(/[^0-9]/g, '');
        el.value = rawValue !== '' ? new Intl.NumberFormat('id-ID').format(rawValue) : '';
        dataKeuangan[idx][field] = rawValue;
    };

    // Fungsi utilitas untuk mendapat hari Senin di minggu suatu tanggal
    const getStartOfWeek = (date) => {
        const d = new Date(date);
        const day = d.getDay();
        const diff = d.getDate() - day + (day === 0 ? -6 : 1);
        return new Date(d.setDate(diff));
    };

    function processChartData(dataUrutWaktu) {
        const rangeFilter = document.getElementById('filterRange').value;
        const groupFilter = document.getElementById('filterGroup').value;

        const today = new Date();
        today.setHours(23, 59, 59, 999);

        let startDate = new Date(0); // Default ke awal waktu jika 'semua'

        if (rangeFilter === 'minggu') {
            startDate = getStartOfWeek(today);
            startDate.setHours(0, 0, 0, 0);
        } else if (rangeFilter === 'bulan') {
            startDate = new Date(today.getFullYear(), today.getMonth(), 1);
        } else if (rangeFilter === 'tahun') {
            startDate = new Date(today.getFullYear(), 0, 1);
        }

        // 1. Filter Rentang Data
        const filteredData = dataUrutWaktu.filter(item => new Date(item.tanggal) >= startDate);

        // 2. Grouping Data
        const groupedMap = new Map();

        filteredData.forEach(item => {
            const d = new Date(item.tanggal);
            let label = '';

            if (groupFilter === 'harian') {
                label = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
            } else if (groupFilter === 'mingguan') {
                const startOfWeek = getStartOfWeek(d);
                label = `Minggu ${startOfWeek.getDate()} ${startOfWeek.toLocaleDateString('id-ID', { month: 'short' })}`;
            } else if (groupFilter === 'bulanan') {
                label = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            }

            // Karena data sudah urut dari lama ke baru, set akan menimpa saldo sebelumnya
            // Artinya kita mendapatkan saldo AKHIR di hari/minggu/bulan tersebut
            groupedMap.set(label, item.tempSaldo);
        });

        renderChart(Array.from(groupedMap.keys()), Array.from(groupedMap.values()));
    }

    function renderUI() {
        const tbody = document.getElementById('tabelBody');
        tbody.innerHTML = '';
        
        dataKeuangan.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));

        let totalPendapatanHariIni = 0;
        let totalPengeluaranHariIni = 0;
        const hariIni = getTodayStr();

        let dataUrutWaktu = [...dataKeuangan].sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
        let saldoKalkulasi = 0;

        dataUrutWaktu.forEach((item) => {
            let tabungan = (parseFloat(item.pendapatan) || 0) - (parseFloat(item.pengeluaran) || 0);
            saldoKalkulasi += tabungan;
            item.tempSaldo = saldoKalkulasi; 

            if(item.tanggal === hariIni) {
                totalPendapatanHariIni += parseFloat(item.pendapatan) || 0;
                totalPengeluaranHariIni += parseFloat(item.pengeluaran) || 0;
            }
        });

        // Tabel Data
        dataKeuangan.forEach((item, index) => {
            const tr = document.createElement('tr');
            const tabungan = (parseFloat(item.pendapatan) || 0) - (parseFloat(item.pengeluaran) || 0);
            
            const valPendapatan = item.pendapatan ? new Intl.NumberFormat('id-ID').format(item.pendapatan) : '';
            const valPengeluaran = item.pengeluaran ? new Intl.NumberFormat('id-ID').format(item.pengeluaran) : '';

            tr.innerHTML = `
                <td><input type="date" class="inline-input" value="${item.tanggal}" onchange="updateData(${index}, 'tanggal', this.value)"></td>
                <td><input type="text" class="inline-input" placeholder="0" value="${valPendapatan}" 
                    oninput="formatDanSimpan(this, ${index}, 'pendapatan')" onchange="renderUI()"></td>
                <td><input type="text" class="inline-input" placeholder="0" value="${valPengeluaran}" 
                    oninput="formatDanSimpan(this, ${index}, 'pengeluaran')" onchange="renderUI()"></td>
                <td class="text-right" style="font-weight:500">${formatRp(tabungan)}</td>
                <td class="text-right" style="font-weight:700; color:var(--primary)">${formatRp(item.tempSaldo)}</td>
                <td><button class="btn-danger" onclick="hapusBaris(${index})">Hapus</button></td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('totPendapatanHariIni').innerText = formatRp(totalPendapatanHariIni);
        document.getElementById('totPengeluaranHariIni').innerText = formatRp(totalPengeluaranHariIni);
        document.getElementById('totSaldo').innerText = formatRp(dataUrutWaktu.length > 0 ? dataUrutWaktu[dataUrutWaktu.length - 1].tempSaldo : 0);

        // Update Chart sesuai Filter
        processChartData(dataUrutWaktu);
        
        localStorage.setItem('finance_db_v3', JSON.stringify(dataKeuangan));
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('saldoChart').getContext('2d');
        if(saldoChartInstance) saldoChartInstance.destroy();

        saldoChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Trend Saldo',
                    data: data,
                    borderColor: '#6366f1',
                    backgroundColor: 'rgba(99, 102, 241, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { ticks: { callback: v => 'Rp ' + v.toLocaleString('id-ID') } }
                }
            }
        });
    }

    window.updateData = (idx, field, val) => {
        dataKeuangan[idx][field] = val;
        renderUI();
    };

    window.tambahBaris = () => {
        dataKeuangan.unshift({ 
            tanggal: getTodayStr(),
            pendapatan: '',
            pengeluaran: '' 
        });
        renderUI();
    };

    window.hapusBaris = (idx) => {
        if(confirm('Hapus data ini?')) {
            dataKeuangan.splice(idx, 1);
            renderUI();
        }
    };

    window.hapusSemua = () => {
        if(confirm('Reset semua data?')) {
            dataKeuangan = [];
            renderUI();
        }
    };

    renderUI();
</script>

</body>
</html>
